<!DOCTYPE html>
<html>
<head>
<title>HIH FIFA 2026</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; background:#0f0a1a; color:white; }
.container { max-width: 900px; margin:auto; }
input, select, button { margin:5px; padding:10px; }
.hidden { display:none; }
.card { background:#1e1533; padding:15px; margin:10px 0; border-radius:10px; }
</style>

</head>
<body>

<div class="container">

<h2>HIH FIFA 2026</h2>

<!-- LOGIN -->
<div id="loginScreen">

<input id="staffName" placeholder="Full Name"><br>

<select id="staffDept">
<option value="">Department</option>
<option>IT</option>
<option>Finance</option>
<option>HR</option>
<option>F&B</option>
<option>Other</option>
</select><br>

<input type="password" id="staffPassword" placeholder="Create / Enter Password"><br>

<button onclick="login()">Enter</button>

</div>


<!-- MAIN -->
<div id="mainApp" class="hidden">

<h3 id="welcome"></h3>

<button onclick="logout()">Switch User</button>

<h3>Matches</h3>
<div id="matches"></div>

<h3>Admin</h3>

<input id="adminPass" placeholder="Admin Password">
<input id="weekLabel" placeholder="Week name">
<br>

<button onclick="archiveWeek()">Archive Week</button>
<button onclick="resetAll()">Reset Active Data</button>

</div>

</div>


<script>

// ===== FIREBASE (KEEP SAME CONFIG) =====
var firebaseConfig = {
  apiKey: "AIzaSyDltN4-nFcl4_O55PRh71-C79sALpb5jX0",
  authDomain: "hih-fifa-2026.firebaseapp.com",
  databaseURL: "https://hih-fifa-2026-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hih-fifa-2026"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ===== DATA =====
var currentUser = null;

var matches = [
 {id:1, home:'Brazil', away:'Argentina', kickoff:'2026-07-01T20:00:00Z'},
 {id:2, home:'France', away:'Germany', kickoff:'2026-07-02T20:00:00Z'}
];

// ===== LOGIN (FIRST TIME PASSWORD SYSTEM) =====
function login() {

 let name = staffName.value.trim();
 let dept = staffDept.value;
 let pass = staffPassword.value;

 if(!name || !dept || !pass){
  alert("Fill all fields");
  return;
 }

 let uid = name.toLowerCase().replace(/\s+/g,'_');

 db.ref("users/"+uid).once("value").then(snap => {

  if(!snap.exists()){
   // FIRST LOGIN
   db.ref("users/"+uid).set({
     name:name,
     dept:dept,
     password:pass
   });

   alert("Account created");
  }
  else{
   if(snap.val().password !== pass){
    alert("Wrong password");
    return;
   }
  }

  currentUser = {id:uid,name:name,dept:dept};
  loginScreen.classList.add("hidden");
  mainApp.classList.remove("hidden");

  welcome.innerText = "Welcome " + name;

  loadMatches();
 });

}

// ===== LOGOUT =====
function logout(){
 location.reload();
}

// ===== MATCH DISPLAY =====
function loadMatches(){

 matchesDiv = document.getElementById("matches");
 matchesDiv.innerHTML = "";

 let now = new Date();

 matches.forEach(m => {

   if(new Date(m.kickoff) <= now){
     return; // hide completed
   }

   let div = document.createElement("div");
   div.className = "card";

   let predRef = db.ref("predictions/"+currentUser.id+"/"+m.id);

   predRef.once("value").then(snap => {

    let locked = snap.exists();

    div.innerHTML =
      m.home + " vs " + m.away + "<br>" +
      (locked ?
        "✅ Submitted (Locked)"
        :
        `<input id="h${m.id}" type="number">
         <input id="a${m.id}" type="number">
         <button onclick="predict(${m.id})">Submit</button>`
      );

   });

   matchesDiv.appendChild(div);

 });

}

// ===== SAVE PREDICTION (LOCKED) =====
function predict(id){

 let h = document.getElementById("h"+id).value;
 let a = document.getElementById("a"+id).value;

 if(h==="" || a===""){
  alert("Enter scores"); return;
 }

 let ref = db.ref("predictions/"+currentUser.id+"/"+id);

 ref.once("value").then(snap => {

  if(snap.exists()){
   alert("Already submitted");
   return;
  }

  ref.set({
    home:h,
    away:a
  });

  alert("Saved (locked)");
  loadMatches();
 });

}

// ===== ARCHIVE SYSTEM =====
function archiveWeek(){

 let pass = adminPass.value;
 if(pass !== "admin123"){
  alert("Wrong admin password"); return;
 }

 let label = weekLabel.value || "week_"+Date.now();

 db.ref("predictions").once("value").then(p => {

  db.ref("archive/"+label).set({
    predictions:p.val()
  });

  db.ref("predictions").remove();

  alert("Archived & reset");
 });

}

// ===== RESET =====
function resetAll(){

 let pass = adminPass.value;
 if(pass !== "admin123"){
  alert("Wrong admin password"); return;
 }

 db.ref("predictions").remove();
 alert("Reset done");
}

</script>

</body>
</html>
