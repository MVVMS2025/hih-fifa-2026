*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at 20% 0,rgba(56,189,248,.22),transparent 30%),radial-gradient(circle at 80% 10%,rgba(250,204,21,.17),transparent 26%),linear-gradient(140deg,#060914,#0c1430 45%,#050711);color:var(--text);min-height:100vh}body:before{content:"";position:fixed;inset:0;background:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:38px 38px;pointer-events:none;z-index:-1}.wrap{max-width:1180px;margin:auto;padding:18px}.hero{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:28px;background:linear-gradient(135deg,rgba(17,24,43,.96),rgba(30,64,175,.42)),radial-gradient(circle at 70% 0,rgba(250,204,21,.2),transparent 33%);box-shadow:var(--shadow);padding:24px;margin-bottom:16px}.hero:after{content:"⚽";position:absolute;right:22px;top:5px;font-size:110px;opacity:.08}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,var(--brand),var(--gold));display:grid;place-items:center;font-size:26px;box-shadow:0 0 35px rgba(56,189,248,.25)}h1{font-size:clamp(24px,4vw,44px);line-height:1;font-weight:900;letter-spacing:-1.6px}.sub{color:var(--muted);margin-top:7px;font-weight:600}.pill{border:1px solid var(--line);background:rgba(255,255,255,.07);padding:8px 12px;border-radius:999px;color:#dbeafe;font-size:12px;font-weight:800}.login{min-height:65vh;display:grid;place-items:center}.card{background:linear-gradient(180deg,rgba(22,33,59,.94),rgba(10,15,31,.94));border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}.login-card{width:min(460px,100%);padding:28px}.login-card h2{font-size:26px;margin-bottom:6px}.login-card p{color:var(--muted);margin-bottom:18px}.field{margin:12px 0}.field label{display:block;font-size:12px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px}.field input,.field select{width:100%;padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:#070b18;color:var(--text);font:inherit;outline:none}.field input:focus,.field select:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(56,189,248,.12)}button{font:inherit}.btn{border:0;border-radius:14px;padding:12px 16px;font-weight:900;cursor:pointer;transition:.2s}.btn:hover{transform:translateY(-1px)}.primary{background:linear-gradient(135deg,#2563eb,#38bdf8);color:white}.gold{background:linear-gradient(135deg,#facc15,#fde68a);color:#111827}.danger{background:linear-gradient(135deg,#ef4444,#991b1b);color:white}.ghost{background:rgba(255,255,255,.07);border:1px solid var(--line);color:var(--text)}.wide{width:100%}.hidden{display:none!important}.userbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:12px 0 16px}.user{display:flex;align-items:center;gap:10px}.avatar{width:42px;height:42px;border-radius:16px;background:linear-gradient(135deg,var(--brand),var(--gold));display:grid;place-items:center;color:#08111f;font-weight:900}.grid{display:grid;gap:14px}.stats{grid-template-columns:repeat(4,1fr);margin-bottom:16px}.stat{padding:16px}.stat b{display:block;font-size:26px;color:var(--gold)}.stat span{display:block;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase;margin-top:4px}.tabs{display:flex;gap:8px;overflow:auto;padding:4px 0 14px}.tab{white-space:nowrap;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--muted);padding:10px 14px;border-radius:999px;font-weight:900;cursor:pointer}.tab.active{background:linear-gradient(135deg,#2563eb,#38bdf8);color:white;border-color:transparent}.layout{display:grid;grid-template-columns:1.5fr .8fr;gap:14px}.section{padding:18px}.section h2{font-size:18px;margin-bottom:12px}.muted{color:var(--muted)}.match{padding:14px;border-radius:18px;background:rgba(255,255,255,.055);border:1px solid var(--line);margin-bottom:10px}.match-top{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}.tag{font-size:11px;font-weight:900;border-radius:999px;padding:5px 9px;background:rgba(56,189,248,.12);color:#bae6fd;border:1px solid rgba(56,189,248,.2)}.tag.ok{background:rgba(34,197,94,.12);color:#bbf7d0;border-color:rgba(34,197,94,.22)}.tag.bad{background:rgba(239,68,68,.12);color:#fecaca;border-color:rgba(239,68,68,.22)}.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;text-align:center}.team{padding:10px;border-radius:16px;background:rgba(0,0,0,.16);min-height:72px;display:grid;place-items:center}.crest{width:30px;height:30px;object-fit:contain;margin-bottom:5px}.team-name{font-weight:900}.code{font-size:11px;color:var(--muted);font-weight:900}.vs{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#facc15,#fff7ad);color:#111827;font-weight:900}.score-row,.admin-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px}.score-input{width:68px;text-align:center;padding:10px;border-radius:14px;border:1px solid var(--line);background:#070b18;color:var(--gold);font-weight:900;font-size:20px}.note{font-size:12px;color:var(--muted);font-weight:700;margin-top:10px;text-align:center}.list-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px;border-radius:16px;background:rgba(255,255,255,.055);border:1px solid var(--line);margin-bottom:8px}.rank{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.1);display:inline-grid;place-items:center;font-weight:900;margin-right:8px}.rank.r1{background:linear-gradient(135deg,#facc15,#fff7ad);color:#111827}.rank.r2{background:linear-gradient(135deg,#cbd5e1,#fff);color:#111827}.rank.r3{background:linear-gradient(135deg,#f97316,#fed7aa);color:#111827}.mini{font-size:12px;color:var(--muted)}.sync{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 0}.toast{position:fixed;right:18px;bottom:18px;z-index:99;background:#111827;color:#fff;padding:13px 16px;border-radius:14px;box-shadow:var(--shadow);transform:translateX(130%);transition:.25s;font-weight:900}.toast.show{transform:translateX(0)}.toast.ok{background:#16a34a}.toast.err{background:#dc2626}.empty{padding:28px;text-align:center;color:var(--muted)}.admin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.admin-match{padding:12px;border-radius:16px;background:rgba(255,255,255,.055);border:1px solid var(--line)}.admin-match input{width:55px;text-align:center;padding:9px;border-radius:12px;border:1px solid var(--line);background:#070b18;color:var(--gold);font-weight:900}.table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:16px}.table th,.table td{text-align:left;padding:11px;border-bottom:1px solid var(--line);font-size:13px}.table th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.7px}.mobile-nav{display:none}@media(max-width:860px){.stats{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.hero{border-radius:22px;padding:18px}.userbar{align-items:flex-start}.tabs{display:none}.mobile-nav{display:block;margin-bottom:14px}.mobile-nav select{width:100%;padding:13px;border-radius:14px;background:#070b18;color:var(--text);border:1px solid var(--line)}.teams{grid-template-columns:1fr;}.vs{margin:auto}.topbar{align-items:flex-start}.stat b{font-size:22px}}
</style>

<div class="wrap">
  <section class="hero">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script>
const firebaseConfig={apiKey:"AIzaSyDltN4-nFcl4_O55PRh71-C79sALpb5jX0",authDomain:"hih-fifa-2026.firebaseapp.com",databaseURL:"https://hih-fifa-2026-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"hih-fifa-2026",storageBucket:"hih-fifa-2026.firebasestorage.app",messagingSenderId:"61203658589",appId:"1:61203658589:web:7bf6d856c1c7d969475ab4"};
firebase.initializeApp(firebaseConfig); const db=firebase.database();
const ROOT='hih_wc2026', ADMIN_PASSWORD='hih2026', WINDOW_HOURS=12, PASSWORD_SALT='HIH_WC2026_PREDICTION_APP_V41';
let currentUser=null, currentTab='home', data={users:{},predictions:{},fixtures:{},results:{},activity:{},weeklyWinners:{},scoreSync:{}};
try{currentUser=JSON.parse(sessionStorage.getItem('hih_wc2026_user_v41')||'null')}catch(e){}
const TAB_LIST=[['home','Home'],['predict','Predict'],['results','Results'],['my','My Picks'],['leaderboard','Leaderboard'],['weekly','Weekly Winner'],['admin','Admin']];
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function toast(m,t='info'){const el=document.getElementById('toast');el.textContent=m;el.className='toast show '+(t==='error'?'err':t==='success'?'ok':'');setTimeout(()=>el.classList.remove('show'),3200)}
function mvt(d){if(!d)return 'TBA';return new Date(d).toLocaleString('en-GB',{timeZone:'Indian/Maldives',weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}
function clock(){document.getElementById('clockPill').textContent=new Date().toLocaleTimeString('en-GB',{timeZone:'Indian/Maldives',hour:'2-digit',minute:'2-digit',second:'2-digit'})}setInterval(clock,1000);clock();
async function hashPassword(uid,pw){const msg=PASSWORD_SALT+'|'+uid+'|'+pw;const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function uidFromName(n){return n.trim().toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')}
async function login(){const name=document.getElementById('staffName').value.trim(), dept=document.getElementById('staffDept').value, pw=document.getElementById('staffPassword').value.trim(); if(!name||!dept||pw.length<4){toast('Complete login details','error');return} const uid=uidFromName(name), passHash=await hashPassword(uid,pw), old=data.users?.[uid]; if(old?.passHash&&old.passHash!==passHash){toast('Wrong password','error');return} await db.ref(`${ROOT}/users/${uid}`).set({name,dept,passHash,joinedAt:old?.joinedAt||new Date().toISOString()}); currentUser={id:uid,name,dept}; sessionStorage.setItem('hih_wc2026_user_v41',JSON.stringify(currentUser)); showApp(); toast('Welcome '+name,'success')}
function logout(){currentUser=null;sessionStorage.removeItem('hih_wc2026_user_v41');document.getElementById('app').classList.add('hidden');document.getElementById('loginScreen').classList.remove('hidden')}
function fixtureList(){return Object.values(data.fixtures||{}).sort((a,b)=>new Date(a.kickoffUTC||0)-new Date(b.kickoffUTC||0))}
function getFixture(id){return data.fixtures?.[id]}
function predictionOpen(f){const k=new Date(f.kickoffUTC);const n=new Date();return n>=new Date(k.getTime()-WINDOW_HOURS*3600000)&&n<k}
function isStarted(f){return ['IN_PLAY','PAUSED','LIVE','FINISHED'].includes(f.status)||new Date()>=new Date(f.kickoffUTC)}
function isFinished(f){return f.status==='FINISHED'||!!data.results?.[f.apiId]}
function statusTag(f){if(f.status==='FINISHED')return '<span class="tag ok">Final</span>'; if(['IN_PLAY','PAUSED','LIVE'].includes(f.status))return '<span class="tag bad">Live</span>'; if(predictionOpen(f))return '<span class="tag ok">Open</span>'; return '<span class="tag">Upcoming</span>'}
function calcPoints(p,r){if(!p||!r)return 0;if(+p.home===+r.home&&+p.away===+r.away)return 5;if((+p.home-+p.away)===(+r.home-+r.away))return 3;const pr=+p.home>+p.away?'W':+p.home<+p.away?'L':'D', ar=+r.home>+r.away?'W':+r.home<+r.away?'L':'D';return pr===ar?1:0}
function leaderboard(){const rows=[];for(const [uid,u] of Object.entries(data.users||{})){const ps=data.predictions?.[uid]||{};let points=0,exact=0;for(const [mid,p] of Object.entries(ps)){const r=data.results?.[mid];const pts=calcPoints(p,r);points+=pts;if(pts===5)exact++}rows.push({uid,name:u.name,dept:u.dept,points,exact,predictions:Object.keys(ps).length})}return rows.sort((a,b)=>b.points-a.points||b.exact-a.exact||b.predictions-a.predictions||a.name.localeCompare(b.name))}
function departmentBoard(){const map={};leaderboard().forEach(p=>{if(!map[p.dept])map[p.dept]={dept:p.dept,points:0,players:0,predictions:0};map[p.dept].points+=p.points;map[p.dept].players++;map[p.dept].predictions+=p.predictions});return Object.values(map).sort((a,b)=>b.points-a.points)}
function weekWindow(){const now=new Date();const mvtNow=new Date(now.toLocaleString('en-US',{timeZone:'Indian/Maldives'}));const day=mvtNow.getDay();const diffToFriday=(5-day+7)%7;const friday=new Date(mvtNow);friday.setDate(mvtNow.getDate()+diffToFriday);friday.setHours(23,59,59,999);const start=new Date(friday);start.setDate(friday.getDate()-6);start.setHours(0,0,0,0);return{start,end:friday,key:friday.toISOString().slice(0,10)}}
function weeklyBoard(){const w=weekWindow();const finished=fixtureList().filter(f=>{const d=new Date(f.kickoffUTC);return d>=w.start&&d<=w.end&&data.results?.[f.apiId]});const rows=[];for(const [uid,u] of Object.entries(data.users||{})){let points=0,exact=0,count=0;const ps=data.predictions?.[uid]||{};finished.forEach(f=>{if(ps[f.apiId]){const pts=calcPoints(ps[f.apiId],data.results[f.apiId]);points+=pts;count++;if(pts===5)exact++}});rows.push({uid,name:u.name,dept:u.dept,points,exact,predictions:count})}return rows.sort((a,b)=>b.points-a.points||b.exact-a.exact||b.predictions-a.predictions)}
function updateStats(){const lb=leaderboard();const me=lb.find(x=>x.uid===currentUser?.id);document.getElementById('statRank').textContent=me?('#'+(lb.indexOf(me)+1)):'-';document.getElementById('statPoints').textContent=me?.points||0;document.getElementById('statPredictions').textContent=me?.predictions||0;document.getElementById('statPlayers').textContent=Object.keys(data.users||{}).length;const s=data.scoreSync||{};document.getElementById('syncPill').textContent=s.lastRunAt?`Sync: ${mvt(s.lastRunAt)} • ${s.savedResults||0} results`:'Sync: waiting'}
function tabs(){document.getElementById('tabs').innerHTML=TAB_LIST.map(t=>`<button class="tab ${t[0]===currentTab?'active':''}" onclick="switchTab('${t[0]}')">${t[1]}</button>`).join('');document.getElementById('mobileTab').innerHTML=TAB_LIST.map(t=>`<option value="${t[0]}" ${t[0]===currentTab?'selected':''}>${t[1]}</option>`).join('')}
function switchTab(t){currentTab=t;TAB_LIST.forEach(x=>document.getElementById('view-'+x[0]).classList.toggle('hidden',x[0]!==t));tabs();render()}
function matchCard(f,mode='predict'){const p=data.predictions?.[currentUser?.id]?.[f.apiId], r=data.results?.[f.apiId];let body='';if(mode==='predict'){if(isStarted(f)) body=`<div class="note">Prediction closed</div>`; else if(!predictionOpen(f)) body=`<div class="note">Opens 12h before kickoff</div>`; else if(p) body=`<div class="score-row"><input class="score-input" disabled value="${p.home}"><b>-</b><input class="score-input" disabled value="${p.away}"></div><div class="note">Submitted • cannot change</div>`; else body=`<div class="score-row"><input id="h-${f.apiId}" class="score-input" type="number" min="0" max="20" placeholder="0"><b>-</b><input id="a-${f.apiId}" class="score-input" type="number" min="0" max="20" placeholder="0"></div><div class="score-row"><button class="btn gold" onclick="savePrediction('${f.apiId}')">Submit</button></div>`}else{const pts=p&&r?calcPoints(p,r):null;body=`<div class="score-row"><b style="font-size:24px;color:var(--gold)">${r?r.home:'-'} - ${r?r.away:'-'}</b></div>${p?`<div class="note">Your pick: ${p.home}-${p.away}${pts!==null?' • +'+pts+' pts':''}</div>`:'<div class="note">No prediction</div>'}`}return `<div class="match"><div class="match-top"><div>${statusTag(f)} <span class="mini">${esc(f.group||f.stage||'World Cup')} • ${mvt(f.kickoffUTC)}</span></div><span class="mini">${esc(f.venue||'')}</span></div><div class="teams"><div class="team">${f.homeCrest?`<img class="crest" src="${esc(f.homeCrest)}">`:''}<div class="team-name">${esc(f.home)}</div><div class="code">${esc(f.homeCode)}</div></div><div class="vs">VS</div><div class="team">${f.awayCrest?`<img class="crest" src="${esc(f.awayCrest)}">`:''}<div class="team-name">${esc(f.away)}</div><div class="code">${esc(f.awayCode)}</div></div></div>${body}</div>`}
async function savePrediction(id){const f=getFixture(id);if(!f||!predictionOpen(f)||isStarted(f)){toast('Prediction not open','error');return}if(data.predictions?.[currentUser.id]?.[id]){toast('Already submitted','error');return}const h=document.getElementById('h-'+id).value,a=document.getElementById('a-'+id).value;if(h===''||a===''){toast('Enter both scores','error');return}const home=parseInt(h,10),away=parseInt(a,10);if(isNaN(home)||isNaN(away)||home<0||away<0||home>20||away>20){toast('Invalid score','error');return}await db.ref(`${ROOT}/predictions/${currentUser.id}/${id}`).set({home,away,savedAt:new Date().toISOString()});toast('Prediction saved','success')}
function renderHome(){const fixtures=fixtureList(), next=fixtures.filter(f=>!isStarted(f)).slice(0,4), live=fixtures.filter(f=>['IN_PLAY','PAUSED','LIVE'].includes(f.status)), lb=leaderboard().slice(0,5), wb=weeklyBoard().slice(0,5), sync=data.scoreSync||{};document.getElementById('view-home').innerHTML=`<div class="layout"><div class="card section"><h2>Live & Next</h2>${live.length?live.map(f=>matchCard(f,'result')).join(''):next.length?next.map(f=>matchCard(f,'predict')).join(''):'<div class="empty">No fixtures yet. Run GitHub sync first.</div>'}</div><div class="grid"><div class="card section"><h2>Weekly Winner</h2>${wb[0]?`<div class="list-row"><div><b>🏆 ${esc(wb[0].name)}</b><div class="mini">${esc(wb[0].dept)} • ${wb[0].points} pts this week</div></div></div>`:'<div class="empty">No weekly points yet</div>'}</div><div class="card section"><h2>Top 5</h2>${lb.length?lb.map((p,i)=>`<div class="list-row"><div><span class="rank ${i<3?'r'+(i+1):''}">${i+1}</span><b>${esc(p.name)}</b><div class="mini">${esc(p.dept)}</div></div><b>${p.points}</b></div>`).join(''):'<div class="empty">No players yet</div>'}</div><div class="card section"><h2>Sync Status</h2><div class="mini">Last run: ${sync.lastRunAt?mvt(sync.lastRunAt):'-'}</div><div class="mini">Fixtures: ${sync.savedFixtures||0} • Results: ${sync.savedResults||0}</div><div class="mini">Status: ${esc(sync.status||'-')}</div></div></div></div>`}
function renderPredict(){const fs=fixtureList().filter(f=>!isStarted(f));document.getElementById('view-predict').innerHTML=`<div class="card section"><h2>Predict Matches</h2>${fs.length?fs.map(f=>matchCard(f,'predict')).join(''):'<div class="empty">No upcoming matches available</div>'}</div>`}
function renderResults(){const fs=fixtureList().filter(f=>isFinished(f)).reverse();document.getElementById('view-results').innerHTML=`<div class="card section"><h2>Results</h2>${fs.length?fs.map(f=>matchCard(f,'result')).join(''):'<div class="empty">No results yet</div>'}</div>`}
function renderMy(){const ps=data.predictions?.[currentUser.id]||{};const rows=Object.keys(ps).map(id=>getFixture(id)).filter(Boolean).sort((a,b)=>new Date(a.kickoffUTC)-new Date(b.kickoffUTC));document.getElementById('view-my').innerHTML=`<div class="card section"><h2>My Predictions</h2>${rows.length?rows.map(f=>matchCard(f,isFinished(f)?'result':'predict')).join(''):'<div class="empty">No predictions yet</div>'}</div>`}
function renderLeaderboard(){const lb=leaderboard(), dbd=departmentBoard();document.getElementById('view-leaderboard').innerHTML=`<div class="layout"><div class="card section"><h2>Staff Leaderboard</h2>${lb.length?lb.map((p,i)=>`<div class="list-row"><div><span class="rank ${i<3?'r'+(i+1):''}">${i+1}</span><b>${esc(p.name)}</b><div class="mini">${esc(p.dept)} • ${p.predictions} picks • ${p.exact} exact</div></div><b>${p.points}</b></div>`).join(''):'<div class="empty">No players</div>'}</div><div class="card section"><h2>Department</h2>${dbd.length?dbd.map((d,i)=>`<div class="list-row"><div><span class="rank ${i<3?'r'+(i+1):''}">${i+1}</span><b>${esc(d.dept)}</b><div class="mini">${d.players} players</div></div><b>${d.points}</b></div>`).join(''):'<div class="empty">No departments</div>'}</div></div>`}
function renderWeekly(){const w=weekWindow(), rows=weeklyBoard();document.getElementById('view-weekly').innerHTML=`<div class="card section"><h2>Weekly Winner</h2><p class="muted">Week ending Friday: ${mvt(w.end)}</p>${rows.length?rows.slice(0,10).map((p,i)=>`<div class="list-row"><div><span class="rank ${i<3?'r'+(i+1):''}">${i+1}</span><b>${esc(p.name)}</b><div class="mini">${esc(p.dept)} • ${p.predictions} scored picks • ${p.exact} exact</div></div><b>${p.points}</b></div>`).join(''):'<div class="empty">No weekly points yet</div>'}</div>`}
function renderAdmin(){const fs=fixtureList();document.getElementById('view-admin').innerHTML=`<div class="card section"><h2>Admin</h2><div class="field" style="max-width:300px"><label>Admin password</label><input id="adminPass" type="password" placeholder="Admin password"></div><div class="sync"><button class="btn gold" onclick="saveManualResults()">Save Manual Scores</button><button class="btn primary" onclick="publishWeeklyWinner()">Publish Weekly Winner</button><button class="btn ghost" onclick="exportData()">Export</button><button class="btn danger" onclick="resetPart('results')">Reset Results</button><button class="btn danger" onclick="resetPart('predictions')">Reset Predictions</button><button class="btn danger" onclick="resetPart('all')">Reset All</button></div></div><div class="card section" style="margin-top:14px"><h2>Manual Scores</h2><div class="admin-grid">${fs.map(f=>{const r=data.results?.[f.apiId]||{};return `<div class="admin-match"><b>${esc(f.home)} vs ${esc(f.away)}</b><div class="mini">${mvt(f.kickoffUTC)} • ${esc(f.status)}</div><div class="admin-row"><input id="mh-${f.apiId}" type="number" min="0" max="20" value="${r.home??''}"><b>-</b><input id="ma-${f.apiId}" type="number" min="0" max="20" value="${r.away??''}"></div></div>`}).join('')}</div></div>`}
function adminOk(){const el=document.getElementById('adminPass');if(!el||el.value!==ADMIN_PASSWORD){toast('Enter admin password','error');return false}return true}
async function saveManualResults(){if(!adminOk())return;const updates={};let count=0;fixtureList().forEach(f=>{const h=document.getElementById('mh-'+f.apiId)?.value,a=document.getElementById('ma-'+f.apiId)?.value;if(h===''&&a==='')return;if(h===''||a===''){toast('Both scores required for '+f.home+' vs '+f.away,'error');throw new Error('Missing score')}const home=parseInt(h,10),away=parseInt(a,10);if(isNaN(home)||isNaN(away))return;updates[f.apiId]={home,away,source:'manual',apiId:f.apiId,apiStatus:'FINISHED',providerHome:f.home,providerAway:f.away,matchMethod:'manual',updatedAt:new Date().toISOString(),updatedBy:'admin'};count++});if(!count){toast('No scores entered');return}await db.ref(`${ROOT}/results`).update(updates);await db.ref(`${ROOT}/activity`).push({type:'manual_results',message:`Admin saved ${count} manual result(s)`,time:new Date().toISOString()});toast(count+' result(s) saved','success')}
async function publishWeeklyWinner(){if(!adminOk())return;const w=weekWindow(), top5=weeklyBoard().slice(0,5), winner=top5[0]||null;await db.ref(`${ROOT}/weeklyWinners/${w.key}`).set({weekKey:w.key,weekStart:w.start.toISOString(),weekEnd:w.end.toISOString(),winner,top5,publishedAt:new Date().toISOString()});toast('Weekly winner published','success')}
async function resetPart(part){if(!adminOk())return;const phrase=part==='all'?'RESET ALL':'RESET '+part.toUpperCase();if(prompt('Type '+phrase+' to confirm')!==phrase){toast('Reset cancelled');return}const u={};if(part==='all'||part==='users')u[`${ROOT}/users`]=null;if(part==='all'||part==='predictions')u[`${ROOT}/predictions`]=null;if(part==='all'||part==='results')u[`${ROOT}/results`]=null;if(part==='all'){u[`${ROOT}/weeklyWinners`]=null;u[`${ROOT}/activity`]=null}await db.ref().update(u);toast('Reset complete','success');if(part==='all'){logout()}}
function exportData(){if(!adminOk())return;const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hih_wc2026_v41_backup.json';a.click();URL.revokeObjectURL(a.href)}
function render(){if(!currentUser)return;updateStats();tabs();if(currentTab==='home')renderHome();if(currentTab==='predict')renderPredict();if(currentTab==='results')renderResults();if(currentTab==='my')renderMy();if(currentTab==='leaderboard')renderLeaderboard();if(currentTab==='weekly')renderWeekly();if(currentTab==='admin')renderAdmin()}
function showApp(){document.getElementById('loginScreen').classList.add('hidden');document.getElementById('app').classList.remove('hidden');document.getElementById('avatar').textContent=currentUser.name.charAt(0).toUpperCase();document.getElementById('userName').textContent=currentUser.name;document.getElementById('userDept').textContent=currentUser.dept;render()}
db.ref(ROOT).on('value',snap=>{data=snap.val()||{};data.users=data.users||{};data.predictions=data.predictions||{};data.fixtures=data.fixtures||{};data.results=data.results||{};data.activity=data.activity||{};data.weeklyWinners=data.weeklyWinners||{};data.scoreSync=data.scoreSync||{};if(currentUser)showApp();});
if(currentUser)showApp();
</script>
</body>
</html>
